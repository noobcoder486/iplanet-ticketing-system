      <mat-card class="p-2 mb-4" style="z-index: 9;">
          <div class="row">
            <div class="col-sm-9 ">
                <h3 class="header_text">Advance Payment List</h3>
            </div>

      <mat-card>
        <div class="mat-card-s3">
            <div class="d-flex">
                <!-- first field -->
                <div class="col-sm-3">
                    <label>Location Code</label>
                    <ng-select [items]="LocationForJob.Data"  [(ngModel)]="LocationCode" bindLabel="TEXT" bindValue="Id"
                      >
                    </ng-select>
                </div>
                <!-- 2nd field -->
                <div class="col-sm-3">
                    <mat-form-field class="example-full-width" appearance="outline">
                        <mat-label>Mobile Number</mat-label>
                        <input type="number" class="x_input" matInput placeholder="Search Mobile No" [(ngModel)]="MobileNo">
                    </mat-form-field>
                </div>
                <!-- 3rd field -->
                <div class="col-sm-3">
                    <mat-form-field class="example-full-width" appearance="outline">
                        <mat-label>Case Id</mat-label>
                        <input type="text" class="x_input" matInput placeholder="Search CaseId" [(ngModel)]="CaseId">
                    </mat-form-field>
                </div>
                <div class="col-sm-3">
                    <div class="x_final_buttons1" style="margin: 20px 0 15px !important;">
                    <button class="x_final_button x_active_btn x_save_button" (click)="GetAdvancePaymentList('', MobileNo, LocationCode, CaseId)">Search</button>
                    </div>
              </div>
            </div>
          </div>
