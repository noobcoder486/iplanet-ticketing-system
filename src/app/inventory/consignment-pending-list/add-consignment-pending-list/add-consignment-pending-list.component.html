        <mat-card class="mt-2">
    <div class="row">
        <mat-card>
            <!-- Scrollable Container -->
            <div class="items_details_grid" style="max-height: 400px; overflow: auto;">
                <table class="table table-success table-striped table-wrap">
                    <thead>
                        <tr style="height: 30px !important; align-items: center;">
                            <th class="fontFamily" style="width: 10%;">Delivery</th>
                            <th class="fontFamily" style="width: 20%;">Delivery Date</th>
                            <th class="fontFamily" style="width: 40%;">Delivery Status</th>
                            <th class="fontFamily" style="width: 10%;">Total Quantity</th>
                            <th class="fontFamily" style="width: 20%;">Ship_to_GSX Code</th>
                            <th class="fontFamily" style="width: 20%;">Location Code</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of pendingAcknowlegdeList">
                            <td style="width: 10%;"><span>{{item.deliveryNumber}}</span></td>
                            <td style="width: 20%;"><span>{{item.deliveredDate}}</span></td>
                            <td style="width: 40%;"><span>{{item.statusCode}}</span></td>
                            <td style="width: 10%;"><span>{{item?.parts.length}}</span></td>
                            <td style="width: 20%;"><span>{{item.Ship_to_GSX}}</span></td>
                            <td style="width: 20%;"><span>{{item.LocationCode}}</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </mat-card>

        <div class="mt-2" *ngIf="isShowSaveButton">
            <button style="float: right;" class="btn btn-success" (click)="saveConsignmentList()">Save</button>
        </div>
    </div>
</mat-card>

    </div>
