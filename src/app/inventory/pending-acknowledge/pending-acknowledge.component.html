<ngx-spinner size="medium" [type]="typeSelected">
  <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
<section class="content">
  <div class="container-fluid">
    <div class="row">
    <mat-card class="p-2 mb-4" style="z-index: 9;">
      <div class="row">
        <div class="col-sm-10 ">
          <p style="font-size: 16px !important;color:black;font-weight: 600;"> Pending Acknowledgement</p>
          <p class="mt-11 ml-8">
            <span *ngFor="let cumb of breadCumbList;let i = index">
              <span *ngIf="breadCumbList.length-1 == i">
                <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>{{cumb.text}}
              </span>
              <a *ngIf="breadCumbList.length-1 != i" (click)="breadCumbClick(cumb.url)" class="breadcumb">
                <span *ngIf="i!=0">
                  <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>
                </span> {{cumb.text}}
              </a>
            </span>
          </p>

        </div>
        <div class="col-sm-2 btn-head-group">
          <div class="d-flex justify-content-end">
            <ng-container *ngIf="toolBarAction.length > 0">
              <ng-conainer *ngFor="let toolbar of toolBarAction">
                <button mat-raised-button color="primary" class="{{toolbar.title}}" (click)="actionEvent(toolbar)">
                  <mat-icon>{{toolbar.icon}}</mat-icon>
                  <span class="{{toolbar.title}}">{{toolbar.title}}</span>
                </button>
              </ng-conainer>
            </ng-container>
          </div>
        </div>
      </div>
    </mat-card>
    </div>

    <div class="row" style="padding-bottom: 20px;">
      <mat-card>
        <div class="col-lg-4 col-sm-4 col-md-4">
          <ng-select [items]="LocationForJob.Data" bindLabel="TEXT" (change)="getPendingAcknowledgeMent()"
            bindValue="Id" placeholder="Location">
          </ng-select>
        </div>
      </mat-card>
    </div>

     
       
        
        <div class="row">
          <mat-card>
          <!-- <div class="scrollcntr" style="height: 410px;"> -->

            <div class="items_details_grid">
              <table class="table table-success table-striped table-wrap">
                <thead>
                  <tr style="height: 30px !important;">
                    <th class="fontFamily" style="width: 10%;height: 30px !important;" scope="col">Delivery</th>
                    <th class="fontFamily" style="width: 20%;height: 30px !important;" scope="col">Delivery Date</th>
                    <th class="fontFamily" style="width: 40%;height: 30px !important;" scope="col">Delivery Status</th>
                    <th class="fontFamily" style="width: 10%;height: 30px !important;" scope="col">Total Quantity</th>
                    <th class="fontFamily" style="width: 20%;height: 30px !important;" scope="col">Ship To</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let item of pendingAcknowlegdeList">
                    <td style="width: 10%; "><a class="tableBody" (click)="onClick(item)">{{item.deliveryNumber}}</a>
                    </td>
                    <td style="width: 20%; "> <span>{{item.deliveredDate}} </span></td>
                    <td style="width: 40%; "> <span> {{ item.statusCode}} </span></td>
                    <td style="width: 10%; "> <span>{{ item?.parts.length}}</span></td>
                    <td style="width: 20%; "> <span> {{Ship_to_GSX}} </span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          <!-- </div> -->
        </mat-card>
        </div>
      
       
    
     
  </div>
</section>
