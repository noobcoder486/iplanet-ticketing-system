<section class="sales_dasboard content x_container">
  <div class="sales_order_action">
    <div class="tabs_content">

      <div class="tab_content_header" style="height: 30px;">
        <h3 class="header_text">{{ pageTitle }}</h3>
    
        <!-- <div class="col-sm-10">
          <div class="row" *ngIf="isApproverPermission == true">

            <div class="col-sm-12">
              <div class="d-flex justify-content-end">
                <button [hidden]="!isApproverPermission" matTooltip="Enable Billing for Today" class="btn btn-primary"
                  (click)="hideCashEnablePopUp = false">
                  <span style="font-size: 12px !important; font-weight: 400;">Enable Job Creation</span></button>
              </div>
            </div>
          </div>
        </div> -->

         <!-- <div class="create_btn" style="max-width: 108px !important;  width: 100%; height: 35px !important;" *ngIf="isApproverPermission == true">
           <button [hidden]="!isApproverPermission" matTooltip="Enable Billing for Today" class="btn btn-primary"
                  (click)="hideCashEnablePopUp = false">
                  <span style="font-size: 12px !important; font-weight: 400;">Enable Job Creation</span></button>
        </div> -->
        
        <div class="create_btn" style="max-width: 435px !important;  width: 100%; height: 40px !important; align-items: center;">
        
          <div *ngIf="isApproverPermission == true"> 
            <button [hidden]="!isApproverPermission" matTooltip="Enable Billing for Today" class="btn btn-primary"
                  (click)="hideCashEnablePopUp = false">
                  <span style="font-size: 12px !important; font-weight: 400;">Enable Job Creation</span></button></div>

            <div class="mx-4">
          <button matTooltip="Create Unclaimed Device Request"
            style="white-space: nowrap; width: 100%;  font-size: 12px !important; padding: 7px;" class="create_btn_content"
            (click)="add()"> <i
              style="font-size:18px !important;color: blue; font-weight: 600; position: relative; top:3px;padding-right: 5px;"
              class="iconbtn fa-light fa-plus">
            </i> <span style="font-size: 12px !important; font-weight: 600;">Unclaimed</span></button>
            </div>

              <div *ngIf="isApproverPermission == true" class="mx-2"> 
                <button [hidden]="!isApproverPermission" matTooltip="Return Unclaimed Device" class="btn" style="background-color: #0d6efd; color: #ffffff;" 
                  (click)="ReturnToLocation()">
                  <span style="font-size: 12px !important; font-weight: 400;">Return Unclaimed </span></button></div>
        </div>
        <ul class="layout_icons_wrapper wauto">
          <li *ngFor="let tab of tabs; let index= index" (click)="selectTab(index)" [class.active]="tab.active">
            <span *ngIf="tab.gridicon" class="grid_svg_layout layout_icons_content" [innerHtml]="tab.gridicon"></span>
            <a *ngIf="tab.title">{{ tab.title }}</a>
          </li>
        </ul>
      </div>
      <my-tab-create [(active)]="tabs[0].active" [gridicon]="content">
        <app-tiles (onCardSelected)="onCardSelected($event)" [data]="DeliveryChallanData"></app-tiles>
      </my-tab-create>

<!-- 
   <my-tab-create [(active)]="tabs[0].active" [gridicon]="content">
        <app-tiles (onCardSelected)="onCardSelected($event)" [data]="DeliveryChallanData"></app-tiles>
      </my-tab-create> -->


      <!-- Grid -->
      <div>
        <my-tab-create [(active)]="tabs[1].active" [gridicon]="contentOne">
          <app-unclaimed-device-grid [filters]="filtersEventRequest"></app-unclaimed-device-grid>
        </my-tab-create>
      </div>

    </div>
  </div>
</section>


<div class="container" style="  width: 50% !important;  margin: 2% auto !important;max-width: 61% !important;">
  <div class="background" [hidden]="hideCashEnablePopUp">
    <div class="Ux_popup popup" style="position: relative; width: 50% !important;">

      <!-- ************************************** POPUP  ************************************************ -->
      <mat-card>
        <ngx-spinner size="medium" [type]="typeSelected">
          <p style="font-size: 20px; color: white">Loading...</p>
        </ngx-spinner>

        <div>
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
              <b style="font-size: 17px !important;">Enable Job Creation for Today</b>
            </div>
            <div>
              <i class="Ux_close fa-duotone fa-circle-xmark" (click)="hideCashEnablePopUp = true"></i>
            </div>
          </div>
        </div>
        <hr>



        <div>
          <div class="row" style="display: flex; align-items: center; justify-content: space-between;">
            <div class="col-12 locationDiv">
              <label style="font-weight:600; padding-bottom: 0%; padding-bottom: 2%;">Location</label>
              <div style="margin-top: 10px;">
                <input type="checkbox" [(ngModel)]="selectAll" (change)="toggleSelectAll()" />
                <label style="font-weight:600;">Select All Locations</label>
              </div>
              <ng-select [items]="LocationForJob.Data" bindLabel="TEXT" [disabled]="false" bindValue="Id"
                [(ngModel)]="MultipleLocationCode" placeholder="" [multiple]="true"></ng-select>

            </div>
            <div class="col-12">
              <label style="font-weight:600; padding-bottom: 0%; padding-bottom: 2%;">Remark</label>
              <textarea rows="4" style="width: 100%;" cols="50" maxlength="4000" [(ngModel)]="ReasonForUnlock"
                placeholder="Write Your Remarks here:-"></textarea>
            </div>
            <br>
            <div class="col-12"
              style="padding-right: 20px; display: flex; align-items: center; justify-content: center;">
              <button class="x_final_button x_active_btn x_save_button" (click)="enableBilling()">Enable</button>
            </div>
          </div>
        </div>
      </mat-card>

    </div>
  </div>
</div>
