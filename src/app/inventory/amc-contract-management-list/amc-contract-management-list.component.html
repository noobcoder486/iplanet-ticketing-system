<section class="content">
  <ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
    <p style="color: white"> Loading... </p>
  </ngx-spinner>
  <mat-card>
    <div class="row">
      <div class="col-lg-8 col-md-6 col-sm-6">
        <p style="font-size: 16px !important; font-weight: 600 !important;">AMC Contract Management List</p>
      </div>
      <div class="col-lg-2 col-md-6 col-sm-6">
        <button (click)="GetAmcContractManagementList()" style="float: right;width: 60% !important" class="btn blue-button">Generate</button>
      </div>
      <div class="col-lg-2 col-md-6 col-sm-6">
        <button (click)="ExportAmcContractManagementList()" style="width: 60% !important" class="btn btn-success">Export </button>
      </div>
    </div>
  </mat-card>

  <mat-card class="mt-2">

    <div class="row">

      <div class="col-lg-3 col-md-6 col-sm-6">
        <label for="" style="font-weight: 600 !important; font-size: 14px !important; margin-bottom: 3px !important;">Customer Code</label> <br>
        <input style="width: 80% !important;" type="text" [(ngModel)]="CustomerCode">
      </div>
      <div class="col-lg-3 col-md-6 col-sm-6">
        <label for="" style="font-weight: 600 !important; font-size: 14px !important; margin-bottom: 3px !important;">Contract Code</label> <br>
        <input style="width: 80% !important;" type="text" [(ngModel)]="ContractCode">
      </div>
      <div class="col-lg-3 col-md-6 col-sm-6">
        <mat-form-field appearance="fill" style="width: 80%;">
          <mat-label style="font-size: 14px !important;">Start Date</mat-label>
          <input matInput [matDatepicker]="startPicker" [(ngModel)]="StartDate" name="StartDate"
            placeholder="Start date">
          <mat-datepicker-toggle matTooltip="Select Start Date" matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="col-lg-3 col-md-6 col-sm-6">
        <mat-form-field appearance="fill" style="width: 80%;">
          <mat-label style="font-size: 14px !important;">End Date</mat-label>
          <input matInput [matDatepicker]="endPicker" [(ngModel)]="EndDate" name="EndDate" placeholder="End date">
          <mat-datepicker-toggle matTooltip="Select End Date" matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>
      </div>

    </div>

  </mat-card>

  <mat-card class="mt-2">
    <div class="row clearfix" *ngIf="columns.length > 0">
      <div class="table-responsive">
        <nitc-grid [gridcolumns]="columns" [dataSource]="detail" [actions]="actionDetails"
          [hideSpinnerEvents]="hideSpinnerEvent" (actionEvent)="actionEmit($event)" (changeEvent)="loadPageData($event)"
          [isAllowSelect]="isChoose">
        </nitc-grid>
      </div>
    </div>
  </mat-card>


</section>
