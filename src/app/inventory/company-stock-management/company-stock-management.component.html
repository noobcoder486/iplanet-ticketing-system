<section class="content">
    <ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
        <p style="color: white"> Loading... </p>
    </ngx-spinner>
    <mat-card class="mt-2">
        <div class="row">
            <div class="col-lg-8 col-md-6 col-sm-6">
                <p style="font-size: 16px !important; font-weight:600 !important;">Company Stock Management </p>
            </div>
            <div class="col-lg-2 col-md-6 col-sm-6">
                 <button class="btn btn-warning btn-download"  style="width:40px;height: 35px; padding: 3px; border-radius: 4px;background-color: #5cb945;" 
                    matTooltip="Download Sample Excel" (click)="downloadSampleFile()" >
                    <i style="color: white;" class="fa fa-download" aria-hidden="true"></i>
                  </button>
            </div>
            <div class="col-lg-2 col-md-6 col-sm-6">
                <input type="file" id="NewCompanyStock" accept=".xls, .xlsx" style="display: none;"
                    (change)="FileUploadCompanyStock($event)">
                <button (click)="selectFile('CompanyStockExcelFormat')" matTooltip="Bulk Upload Company Stock "
                    class="btn" style="width: 30px; padding: 3px; border-radius: 4px; background-color: #233f76;">
                    <img src="assets/images/uploadNew.png">
                </button>
            </div>

        </div>
    </mat-card>

    <mat-card>
        <div class="row">
            <div class="col-lg-2 col-sm-6 col-md-6">
              <ng-select style="margin-top: 20px !important;" placeholder="Company"  [(ngModel)]="CompanyCode"> 

              </ng-select>
            </div>
            <div class="col-lg-2 col-sm-6 col-md-6">
              <ng-select style="margin-top: 20px !important;"  placeholder="Location" [(ngModel)]="LocationCode"></ng-select>
                 
            </div>
            <div class="col-lg-2 col-sm-6 col-md-6">
               <label for="">Material Code</label>
                <input style="margin-top: 1px !important; height: 30px !important; "  type="text" [(ngModel)]="MaterialCode">
            </div>
            <div class="col-lg-2 col-sm-6 col-md-6">
                 <mat-form-field appearance="fill" style="width: 80%;">
          <mat-label style="font-size: 14px !important;">Start Date</mat-label>
          <input matInput [matDatepicker]="startPicker" [(ngModel)]="StartDate" name="StartDate"
            placeholder="Start date">
          <mat-datepicker-toggle matTooltip="Select Start Date" matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>
            </div>
            <div class="col-lg-2 col-sm-6 col-md-6">
                <mat-form-field appearance="fill" style="width: 80%;">
          <mat-label style="font-size: 14px !important;">End Date</mat-label>
          <input matInput [matDatepicker]="endPicker" [(ngModel)]="EndDate" name="EndDate" placeholder="End date">
          <mat-datepicker-toggle matTooltip="Select End Date" matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>
            </div>
            <div class="col-lg-2 col-sm-6 col-md-6">
                <button (click)="GetCompanyStockList()" class="btn blue-button" style="margin-top: 20px !important;" > search </button>
                <button class="btn btn-success" style="margin-top: 20px !important; float: right !important;"> Export </button>

            </div>
        </div>
    </mat-card>
    
    <mat-card class="mt-2">

    <div class="row clearfix" *ngIf="columns.length > 0">
      <div class="table-responsive">
        <nitc-grid [gridcolumns]="columns" [dataSource]="detail" [actions]="actionDetails"
          [hideSpinnerEvents]="hideSpinnerEvent" (actionEvent)="actionEmit($event)" (changeEvent)="loadPageData($event)"
          [isAllowSelect]="isChoose">
        </nitc-grid>
      </div>
    </div>

    </mat-card>
</section>
