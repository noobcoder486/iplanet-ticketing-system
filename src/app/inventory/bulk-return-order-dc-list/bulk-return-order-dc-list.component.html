<ngx-spinner size="medium" [type]="typeSelected">
    <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>

<section class="content">
    <mat-card class="mt-2">
      <div class="row" >
        <div class="col-lg-9 col-sm-9 col-md-9">
            <p style="font-weight: 600 !important; font-size: 16px !important;">Bulk Return DC List </p>
        </div>
        <div class="col-lg-2 col-sm-2 col-md-2">
            <button class="btn blue-button" (click)="add()">
                Create New DC
            </button>
        </div>
         <div class="col-lg-1 col-sm-1 col-md-1 tab_content_header" style="height: 0px;">
          
          <ul class="layout_icons_wrapper wauto" style="margin-top: 40px;">
            <li *ngFor="let tab of tabs; let index= index" (click)="selectTab(index)" [class.active]="tab.active">
              <span *ngIf="tab.gridicon" class="grid_svg_layout layout_icons_content" [innerHtml]="tab.gridicon"></span>
              <a *ngIf="tab.title">{{ tab.title }}</a>
            </li>
          </ul>
        </div>
      </div>
    </mat-card>

    <mat-card class="mt-2">
          <div class="tabs_content">
  
        <!-- <div class="tab_content_header" style="height: 30px;">
          
          <ul class="layout_icons_wrapper wauto">
            <li *ngFor="let tab of tabs; let index= index" (click)="selectTab(index)" [class.active]="tab.active">
              <span *ngIf="tab.gridicon" class="grid_svg_layout layout_icons_content" [innerHtml]="tab.gridicon"></span>
              <a *ngIf="tab.title">{{ tab.title }}</a>
            </li>
          </ul>
        </div> -->
        <my-tab-create [(active)]="tabs[0].active" [gridicon]="content" >
          <app-tiles (onCardSelected)="onCardSelected($event)" [data]="BulkReturnData"></app-tiles>
        </my-tab-create>
  
        <div>
          <my-tab-create [(active)]="tabs[1].active" [gridicon]="contentOne">
            <app-bulk-return-order-dc-grid [filters]="filtersEventRequest"></app-bulk-return-order-dc-grid>
          </my-tab-create>
        </div>

      </div>
    </mat-card>

</section>
