<div class="content-header">
    <div class="row">
        <div class="col-12">
            <div class="card">
                    <div class="card-body" style="padding: 10px;">
                        <div class="row">
                            <div class="col-lg-12">
                                <h3 class="text-dark" style="font-weight: 700;">Enquiry Form</h3>
                                <hr />
                            </div>
                        </div>
                        <mat-card style="border-radius: 10px;box-shadow: rgba(0, 0, 0, 0.05) 0px 6px 24px 0px, rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;">
                        <div class="row">

                            <div class="col-lg-3 col-sm-6 col-12">
                                <label><b>Customer Code:</b></label><br>
                                {{CustomerAllDetails[0]?.CustomerCode}}
                            </div> 
                          

                            <div class="col-lg-3 col-sm-6 col-12">
                                <label><b>Customer Name:</b></label><br>
                                {{CustomerAllDetails[0]?.FirstName}}&nbsp;{{CustomerAllDetails[0]?.LastName}}
                            </div>

                            <div class="col-lg-3 col-sm-6 col-12">
                                <label><b>Customer Mobile Number:</b></label><br>
                                {{CustomerAllDetails[0]?.MobileNo}}
                            </div>

                            <div class="col-lg-3 col-sm-6 col-12">
                                <label><b>Customer Email Id:</b></label><br>
                                {{CustomerAllDetails[0]?.EmailID}}
                            </div>
                             
                        </div><br />
                         <br />
                        <div class="row">
                            <div class="col-sm-3 col-lg-3 col-md-3">
                                <!-- <ng-select [items]="DispositionList" bindLabel="DispositionDescription" bindValue="DispositionCode" placeholder="Dispositon" [(ngModel)]="DispositionType"></ng-select> -->
                                <ng-select [items]="EnquiryDispositionDD.Data" bindLabel="TEXT" bindValue="Id" placeholder="Dispositon" [(ngModel)]="DispositionType"></ng-select>

                            </div>
                            <div class="col-sm-3 col-lg-3 col-md-3">
                                <ng-select [items]="ProductName.Data" bindLabel="TEXT" bindValue="Id" placeholder="Product" [(ngModel)]="productIdData"></ng-select>
                            </div>                    
                            <div class="col-lg-3 col-sm-3 col-md-3">
                                <label style="font-weight: 500;"><b>Serial Number</b></label>
                                <input style="width:80%;border:1px solid rgb(179, 177, 177);height:30px;border-radius:2px" type="text" placeholder="Serial Number" [(ngModel)]="serialNo" />
                            </div>
                            <div class="col-lg-3 col-sm-3 col-md-3">
                                <label style="font-weight: 500;"><b>Remarks</b></label><br />
                                <textarea style="width:80%;border:1px solid rgb(179, 177, 177);height:30px;border-radius:2px" maxlength="1000" type="text" placeholder="Remarks" [(ngModel)]="Remark"></textarea>
                            </div>
                        </div>
                    </mat-card>
                    <br />
                        <div class="row">
                            <div  style="text-align: right; display: flex; align-items: center; justify-content: end;">
                                <div style="padding-right: 5px;">
                                    <button type="submit" style="cursor:pointer" (click)="onSubmit()"  class="btn btnClass">Save</button>
                                </div>

                                <div>
                                    <button type="button" style="cursor:pointer" (click)="goBack()" class="btn btnCancel" >Cancel</button>
                                </div>
                                <!-- <button (click)="fun()">getMobileNumber</button>
                                
                                -->
                
                                   
                                    
                            </div>
                        </div>
                        
                    </div>
              
            </div>
        </div>
    </div>
 
</div>
