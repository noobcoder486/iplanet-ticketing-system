<ngx-spinner style="width: 100%; height: 100%; position: absolute;" size="medium" *ngIf="Spinner" [type]="typeSelected"  [fullScreen]="true">
    <p style="font-size: 20px; color: white">Loading...</p>
  </ngx-spinner>
  
  <section class="content">
    
    <div class="container-fluid">
      <div class="row">
      <mat-card class="p-2 mb-4" style="z-index: 9;">
        <div class="row">
          <div class="col-sm-2">
            <p style="font-size: 16px !important;color:black;font-weight: 600;">Onsite Repairs</p>
          </div>
       
          <div class="col-sm-10"  >
            <div class="row" *ngIf="false">
            
              <div class="col-sm-2">
              </div>
              <div class="col-2">
                <div class="form-group">
                  <label>Start Date</label><br>
                  <input class="form-control" type="date" [value]="StartDate" 
                    [(ngModel)]="StartDate"  [max]="maxDate" [ngModelOptions]="{standalone: true}" />
                </div>
              </div>
              <div class="col-2">
                <div class="form-group">
                  <label>Start time</label><br>
                  <input class="form-control" id="startTimeInput"  [(ngModel)]="StartTime"
                    [ngModelOptions]="{standalone: true}" type="time" #startTimeInput />
                </div>
              </div>
  
              <div class="col-2">
                <div class="form-group">
                  <label>End Date</label><br>
                  <input class="form-control" type="date" [value]="EndDate" 
                    [(ngModel)]="EndDate" [max]="maxDate" [ngModelOptions]="{standalone: true}" />
                </div>
              </div>
              <div class="col-2">
                <div class="form-group">
                  <label>End time</label><br>
                  <input class="form-control" id="endTimeInput"  [(ngModel)]="EndTime"
                    [ngModelOptions]="{standalone: true}" type="time" #endTimeInput />
                </div>
              </div>
  
      
              <div class="col-2 " style="display: flex;align-items: center;">
                <button class="btnClass"   [disabled]="submitClicked"
                appDebounceClick   [debounceTime]="2000"  (debounceClick)="GetSummary('')">Get Onsite Repairs</button>
              </div>
          
            </div>

            <div class="row">
            
              <div class="col-10">
              </div>
              <div class="col-sm-2">
                <div style="margin-top: 15px; display: flex;align-items: center;">
                    <div class="d-flex justify-content-end">
                      <button [hidden]="!isApproverPermission" matTooltip="Create Pickup for D-Repair"
                      (click)="openReservation()"  class="btn btn-primary" > 
                      <span style="font-size: 12px !important; font-weight: 400;">Create Pickup</span></button>
                  </div>
                </div>
                </div>
            </div>
          </div>
        
         
        </div>
      </mat-card>
      </div>
  
      <mat-card>
  
        <div class="row">
  
          <div class="col-12" style="width: 100%;">
            <div class="row"> 
              <div class="col-lg-3 col-sm-5 col-md-5">
                <b>Repair Id:</b>&nbsp;<br>
                <input type="text" placeholder="Get Repair Code" style="width: 100%; border:1px solid rgb(194, 193, 193);border-radius:2px;height:35px" 
                [(ngModel)]="RepairId" />
              </div>
              <div class="col-lg-3 col-sm-5 col-md-5 justify-content-end">
                <label style="font-weight:600; padding-bottom: 0%;padding-bottom: 2%;">Location </label>
                <ng-select  [items]="LocationForJob.Data" bindLabel="TEXT" [disabled]="false" bindValue="Id"
                [(ngModel)]="LocationCode" placeholder="" ></ng-select>
              </div>
              <div class="col-lg-3 col-sm-5 col-md-5 justify-content-end">
                <!-- <label style="font-weight:600; padding-bottom: 0%;padding-bottom: 2%;">Onsite Status </label>
                <ng-select  [items]="OnsiteStatusDD" bindLabel="TEXT" [disabled]="false" bindValue="Id"
                [(ngModel)]="OnsiteStatus" placeholder="" ></ng-select> -->
      
              </div>
  
              <div class="col-lg-1 col-sm-5 col-md-5 justify-content-end mt-3">
  
                <div class="mt-2" style="display: flex;align-content: center;">
                    <div><button class="btn btn-primary"  (click)="getRepairDetails()">Search</button></div>
                </div>
                
              </div>
            </div>
  
          </div>
   
        </div>
  
  
  
  
  
      </mat-card><br />
  
      <mat-card class="m-0 p-0">
        <div class="row clearfix" >
            <nitc-grid [gridcolumns]="columns" [dataSource]="detail" [actions]="actionDetails"
            [hideSpinnerEvents]="hideSpinnerEvent" (actionEvent)="actionEmit($event)"
            (changeEvent)="PageChange($event)">
            </nitc-grid>
        </div>
    </mat-card>

    </div>
  </section>
