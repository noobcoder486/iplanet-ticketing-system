 
<div  *ngFor="let item of serializedPartListFinal">
  <mat-card *ngIf="repairPartListVerification?.length > 0 "style="margin:10px; border-radius:8px;">
    <div class="col-lg-3" >
      <img src={{item.ImageUrl}} onerror="this.src='./assets/images/crm-logo-icon.png';" style="width: 48px;height:48px;"
      mat-card-avatar /> 
    </div>
      <div class="col-lg-8" style="font-size:18px ;"> {{ item.number}}</div>
      <div class="row">
          <mat-card-subtitle>{{ item.description}}</mat-card-subtitle>
       </div>
    <div class="row">
      <div class="col-sm-6" >
          <mat-form-field appearance="fill">
            <mat-label>KGB</mat-label>
            <input  matInput  [(ngModel)]="item.KGB">
          </mat-form-field>
        </div>
        <div class="col-sm-6"  >
          <mat-form-field appearance="fill">
            <mat-label>KBB*</mat-label>
            <input  matInput  [(ngModel)]="item.KBB" (ngModelChange)="setFunction(item)">
          </mat-form-field>
        </div>
    </div>

    <div class="row mt-2" style="border: 1px solid #cccccc;padding-top: 20px;padding-bottom: 20px;">
      <label style="font-weight: 600;" class="form-label">(Please Upload High Quality Image*)</label>
      <div class="col-6">
        <label style="font-weight: 600;" class="form-label">VMI & MI Image</label>
        <input class="form-control" type="file" style="width: 100%;">
      </div>

      <div class="col-6">
        <label style="font-weight: 600;" class="form-label">KBB 2D Barcode Image </label>
        <input class="form-control" type="file" style="width: 100%;">
     
      </div>

    </div>



    <div style="padding-top: 10px;">
    </div>
    <div class="row">
      <div class="col-12" style="padding-top: 10px;">
          
      </div>
      <div class="col-12" >
          <div  style="float: right;padding-top: 10px;" *ngIf="item.KBB != Null || item.KBB != undefined">
            <a [attr.href]="item.KBBProof" [attr.href]="item.src" target="_blank">{{item?.FileName}}</a>

            <div style="display: flex;align-items: center;justify-content: center;">
              <div>
                <label for="filetype" id="FileTypeBtn"><span style="padding-right: 10px;cursor: pointer;"><b>Select Image</b></span>    </label>
                <input   (click)="fileInput.click()"  accept="image/png, image/gif, image/jpeg" #attachments type="file"
                (change)="OnFileUploadClick($event)"  #fileInput multiple="true" id="filetype" type="file"   style="border-radius:-10%;display: none;width: 35px !important;height: 35px !important;background-color: red !important;">
              </div>

              <div>
                <i (click)="setFunction(item)" class="fa fa-upload" aria-hidden="true"></i>
              </div>
              </div>
                   <!-- <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16" style="border-bottom: 1px solid rgb(136, 136, 250);">
                    <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                    <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54A.505.505 0 0 1 1 12.5v-9a.5.5 0 0 1 .5-.5h13z"/>
                  </svg> -->
                
                
               
        </div>
        </div>
    </div>
</mat-card>
</div>
<div align="end" style="padding: 15px;" *ngIf="repairPartListVerification?.length > 0"  >
<button  class=" x_final_button x_active_btn x_save_button " (click)="onSave()" type="button">Verification</button>
</div>
