 
  <div class="card-body"   style="font-size: 14px !important;">
    <div class="" style="display: flex;justify-content: flex-end;align-items: center;">
      <div style="padding-right: 5px;">
            <button class="btn refreshBtn" (click)="fetch_DiagnosisLookup()">Refresh</button>
      </div>
          <div>
            <button class="btn btn-grad ">Run Diagnostics</button>
         </div>
      </div>
    
      <hr>
    <div *ngFor="let item of diagnosticData">

    
      <div class="row">
        <div class="header_details_content_row" style="padding-bottom: 13px;">
          <div >
            <span class="headerText" >{{item.context.suite}}</span>
          </div>
          <div>
            <span class="valueText"> {{item.context.diagnosticEndTimeStamp}} </span>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="header_details_content_row" style="padding-bottom: 13px;">
          <div>
            <span class="headerText" >{{item.context.diagnosticEventEndResult}}</span>
          </div>
          <!-- <div>
            <span class="valueText"> <a href="">Diagnostics Details </a><i class="fa fa-external-link" aria-hidden="true"></i> </span>
          </div> -->
        </div>
      </div>

      <div class="row"> 
          <div  class="col-2">
            <span >Event ID</span>
          </div>
          <div class="col-4">
            <span>{{item.context.diagnosticEventNumber}}</span>
          </div> 
      </div>


      <div class="col-12 mt-2">

        <mat-expansion-panel (click)="openDialog(item.testResults)" (opened)="panelOpenState = true"
          (closed)="panelOpenState = false">
          <mat-expansion-panel-header>
            <!-- <mat-panel-title>
            Diagnostics Details 
          </mat-panel-title> -->
            <mat-panel-description style="color: black;font-weight: 600;">
              Diagnostics Details
              <!-- Currently I am {{panelOpenState ? 'open' : 'closed'}} -->
            </mat-panel-description>
          </mat-expansion-panel-header>

          <div class="col-12" style=" border-bottom: 1px solid rgb(159, 159, 159);"
            *ngFor="let item of item.testResults">
            <div class="row mt-2">
              <div class="col-6">
                <span style="font-size: 14px !important; font-weight: 600;">{{item.moduleName}}</span> - <span
                  style="font-size: 14px !important; font-weight: 600;"> {{item.testId}} </span>
              </div>

              <div class="col-6">
                <span style="font-size: 14px !important; font-weight: 600;">{{item.testName}}</span>
              </div>

              <div class="col-12 mt-2">
                <i style="font-size: 14px !important;"
                  [ngClass]="(item.testStatus === 'PASSED') ? 'fa fa-check' : (item.testStatus === 'WARNING') ? 'fa fa-exclamation-triangle' : 'fa fa-times'"
                  aria-hidden="true"></i>
                <!-- <i style="font-size: 14px !important; " [ngClass]="(item.testStatus === 'PASSED') ? 'fa fa-check' : 'fa fa-exclamation-triangle'" aria-hidden="true"></i> -->
                {{item.testStatus}}
              </div>

              <div class="col-12 mt-2">
                <span style="font-size: 14px !important;">{{item.testMessage}}</span>
              </div>
            </div>
          </div>
        </mat-expansion-panel>
        <!-- <span class="valueText" (click)="openDialog(item.testResults)"> <a style="color: rgb(94, 94, 249);text-decoration: underline;" >Diagnostics Details </a><i class="fa fa-external-link" aria-hidden="true"></i> </span> -->

      </div>
      <hr>
