
<div *ngFor="let question of questions" >
    <div class="ux_question">
      <mat-card style="margin:10px; border-radius:8px;">
        <div [innerHTML]="question.questionPhrase"></div>
        <div *ngIf="question.answerType=='INT'">
            <mat-form-field appearance="standard" [style.width.%]="100" style="padding-top: 30px;">
              <mat-label>Answer</mat-label>
              <input matInput [(ngModel)]="question.selectAnswer">
            </mat-form-field>
          </div>
          <div *ngIf="question.answerType=='RAD'">
            <div>
              <mat-radio-group aria-label="Select an option"
              (change)="onAnswerSelect($event.value, question)"
               name="warrantyStatus">
                <mat-radio-button *ngFor="let answer of question.answers" [value]="answer"><span [innerHTML]="answer.answerPhrase"></span></mat-radio-button>
              </mat-radio-group>
            </div>
          </div>
          <div *ngIf="question.answerType=='FFB'">
            <mat-form-field class="textareafild" appearance="standard" [style.width.%]="100">
              <mat-label>Answer</mat-label>
              <textarea matInput [(ngModel)]="question.selectAnswer" rows="1"></textarea>
            </mat-form-field>
          </div>
          <div *ngIf="question.answerType=='DPD'" style="padding-top: 10px;">
            <ng-select placeholder="Answer"
            class="mt-4"
            [items]="question.answers"
             bindLabel="answerPhrase"
             (change)="onAnswerSelect($event, question)">
      
            </ng-select>
          </div>
          <div class="row" *ngIf="question.answerType=='BBT'">
            <div class="col-sm-6 text-center mb-2" *ngFor="let answer of question.answers">
              <button type="button" class="btn"
              [class]="{'btn-success': answer.selected, 'btn-primary':answer.selected != true}"
              (click)="onAnswerSelect(answer,question)"
               style="width: 100% ;">
                <span [innerHTML]="answer.answerPhrase"></span>
              </button>
            </div>
          </div>
          <div *ngIf="question.answerType=='BBX'">
            <mat-form-field class="textareafild" appearance="standard" [style.width.%]="100" >
              <mat-label>Answer</mat-label>
              <textarea matInput [(ngModel)]="question.answer" rows="3"></textarea>
            </mat-form-field>
          </div>
          <div class="row" *ngIf="answerType=='CHK'">
            <div class="col-sm-12" *ngFor="let answer of question.answers">
              <div class="card" style="box-shadow: 1px 1px 5px #b3b3b3; margin-bottom: 15px !important;" (click)="onAnswerSelect(answer,question)" >
                <div class="card-body">
                  <div class="row">
                    <div class="col-sm-2">
                      <i class="fa-2xl fa-duotone " [ngClass]="{'fa-square-check': answer.selected ==true,'fa-square': answer.selected !=true}"></i>
                    </div>
                    <div class="col-sm-10">
                      <div [innerHTML]="answer.answerPhrase"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
       <div class="row" *ngIf="question.answerType==undefined || question.answerType==null" >
        <div *ngFor="let answer of question.answers">
          <div style="font-weight: bold;" [innerHTML]="answer.answerPhrase"></div>
          <div *ngIf="answer.questions != null && answer.questions != undefined">
            <app-question [isChild] ='true' [questions]="answer.questions"></app-question>
          </div>
        </div>
      </div> 
      </mat-card>
  
      
    </div>
    <div *ngIf="(question?.selectAnswer != null && question?.selectAnswer != undefined ) && (question?.selectAnswer?.questions != null && question?.selectAnswer?.questions != undefined)">
      <app-question [isChild] ='true' [questions]="question.selectAnswer.questions"></app-question>
    </div>
  </div>
