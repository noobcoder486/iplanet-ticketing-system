<div class="container mt-5">
  <div class="row">
      <div class="col-lg-12 col-sm-12 mt-2"  >
      
        <mat-card  style="height:300px; padding: 0px !important;box-shadow: rgba(60, 64, 67, 0.3) 0px 1px 2px 0px, rgba(60, 64, 67, 0.15) 0px 2px 6px 2px; border-radius: 10px; border: 1px solid #e1e8f2;"> 
          <!-- <div class="BorderBox card_heading_text " style="height: 100%;"> -->
            <div class="swiperBox" style="height:100%;">  
      
              <div class="HeaderBox"> 
                <div class="tabheader"  style="display: flex;justify-content: space-between;border-bottom:1px solid black;">
  
                  <div style="font-size: 17px;">
                    <i class="fa-solid fa-pen"></i>
                    <span style="padding-left:17px;">Signature</span>
                  </div>
  
                  <div style="width: 20%;">
                    <ng-select   [items]="SignatureType" [(ngModel)]="SignatureTypeValue">
                  </ng-select>
                  </div>  
              </div>
              </div>
              <div>
                <div class="" style="display: flex;justify-content: center;"> 
                      <canvas #canvas width="850" height="200" style="background-color:rgb(255, 255, 255);border: dotted;"></canvas>  
                  </div>
  
                    <!-- Button -->
              <div  style="display:flex; justify-content:right;">
                <div class="btn-flex" style="float: right;">
              <button (click)="SaveSignature()" class="btn btn-success">Save</button>
              <button (click)="ClearSignature()" class="btn btn-danger">Reset</button>
                </div>
            </div>
              </div>
  
             
               
             <br>
          </div>
        </mat-card>
      </div>
      </div>
  </div>
