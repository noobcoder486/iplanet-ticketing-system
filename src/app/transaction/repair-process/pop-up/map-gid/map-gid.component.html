<section class="content back-ground" style="width: 50%; margin: 4% auto;">
    <div style="background-color: white;">
        <div style="background-color: gainsboro;color:black; display: flex; align-items: center; justify-content: space-between;">
            <div><span style="font-size: 20px !important;color:black;font-weight: 600;height:30px">GID Search</span></div>
            <div><i (click)="CloseBtn()" class="Ux_close fa-duotone fa-circle-xmark"></i></div>
        </div>
        <div style="padding-left: 10px; padding-right: 10px;">
            <mat-card class="mt-2">
                <div class="row">
                    <div class="col-12">
                        <input style="width: 100%; height:36px;border-radius:5px;border:1px solid rgb(197, 197, 197)"
                            type="text" [(ngModel)]="gidNumber" placeholder="GID Search">
                    </div>
                </div>
                <div class="row">
                    <div class="col-12 mt-3">
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <button class="btnClass" style="height: 35px;"
                                (click)="getRepairDetails()">Search</button>
                        </div>
                    </div>
                </div>
            </mat-card>
        </div>
    </div>
</section>
