<div class="container" style="margin: 2% auto !important;max-width: 60% !important;">
   <div class="background">
      <div class="Ux_popup popup" style="position: relative;">
         <mat-card>
            <div class="mt-3">
               <p style="font-size: 18px !important; font-weight: 600;">Second Repair</p>
            </div>
            <div class="mt-3" style="margin-top: 7% !important;">
               <ng-select placeholder="Select Reason" style="width: 90% !important;"
                  (search)="OnSecondRepairReasonSearch($event)" [items]="SecondRepairReasonDD.Data" bindValue="Id"
                  bindLabel="TEXT" [(ngModel)]="Reason"></ng-select>
            </div>

            <div class="row mt-3">
               <Label>Enter Remarks </Label>
               <textarea [(ngModel)]="Remarks" rows="2" cols="30"
                  style="max-width: 88%; margin-left: 2% !important;"></textarea>
            </div>

            <div class="row mt-3">
               <div class="col-lg-6 col-sm-6 col-md-6">
                  <button style="float: right;" class="btn btn-success" (click)="onSubmit()">Save</button>
               </div>
               <div class="col-lg-6 col-sm-6 col-md-6">
                  <button class="btn btn-warning" (click)="onCancel()">Cancel</button>
               </div>
            </div>

         </mat-card>
      </div>
   </div>
</div>
