<section class="container" [hidden]="!isDisplayTokenHidden">
  <ngx-spinner size="medium" [type]="typeSelected">
    <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
  <div class="row mb-2 mt-5">
    <div class="col-12">
      <div class="card" style="box-shadow: 0 0 1px rgb(0 0 0 / 13%), 0 1px 3px rgb(0 0 0 / 20%); padding: 0px;margin-bottom: 14px !important;">
        <div class="card-body accordiontab" style="padding: 10px;padding-top: 0;margin: 0;">
          <div class="row">
            <div class="col-12 tabheader">
              <h3 class="text-dark">
                Create Token
              </h3>
            </div>
            <div class="col-5" style="text-align: right;">
            </div>
          </div>
          <div class="row" style="padding: 20px;">
            <div class="card" style="margin-bottom: 1px !important;"><br>
              <div class="card-body">
                 <div class="row" style="margin: auto 15%;">
                      <div  class="col-lg-12 col-sm-6 col-md-6">
                          <ng-select style="width: 95%;"  [items]="LocationForJob.Data"
                            bindLabel="TEXT" bindValue="Id"  [(ngModel)]="LocationCode" [ngModelOptions]="{standalone: true}"
                            placeholder="Select Location"> 
                        </ng-select>
                        </div>
                   </div>

                <div class="row" style="margin: auto 15%;">
                  <div class="col-lg-2 col-sm-2 col-3"> 
                      <mat-label style="font-size: 14px !important;">ISD</mat-label>
                      <input matInput value="+91" style="border: 1px solid rgb(192, 192, 192);border-radius: 3px;height: 40px !important;font-size: 21px !important;">
                  </div>
                  <div class="col-lg-9 col-sm-10 col-9 mt-4" style="padding-left: 20px;"> 
                      <input type="tel" minlength="10" maxlength="10" (ngModelChange)="searchButtonShow($event)" [pattern]="mobNumberPattern" required [(ngModel)]="userSearchMobileNumber" 
                      style="border: 1px solid rgb(192, 192, 192);border-radius: 3px;height: 40px !important;font-size: 21px !important;" matInput
                      placeholder="mobileNo">
                  </div>
                </div>

                <div class="row">
                  <div class="col-lg-2 col-sm-2" style="margin: 2% auto;">
                    <div style="padding-top:18px ;margin:auto 22%;" *ngIf="isSearchButton">
                      <button class="btn btn-primary" (click)="search()">Search</button>
                      <ngx-spinner bdColor="rgba(0, 0, 0, 0)" size=" large" color="white" type="ball-scale-multiple">
                        <p style="font-size: 20px; color:gray">Loading...</p>
                      </ngx-spinner>
                    </div>
                  </div>



                </div>

             


              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
 

<div [hidden]="isSearched">
  <form [formGroup]="tokenForm"> 
        <div class="row" >
          <div>
            <div
              style="box-shadow: 0 0 1px rgb(0 0 0 / 13%), 0 1px 3px rgb(0 0 0 / 20%); margin-bottom: 1rem; padding: 0px;">
              <div class="col-12 tabheader" style="margin-bottom: 0px;">
                <h3 class="text-dark">
                  Create Customer Token
                </h3>
              </div>
              <div     style="background-color: white;box-shadow: 0 0 1px rgb(0 0 0 / 13%), 0 1px 3px rgb(0 0 0 / 20%); padding: 0px;">
                <div class="card-body accordiontab" style="padding: 10px;padding-top: 0;margin: 0;">
              <div class="row">
                <div class="col-sm-4"> 
                  <mat-form-field class="example-full-width" appearance="outline">
                    <input type="text" #myTitle class="x_input" matInput placeholder="FirstName"
                      [readOnly]="isCustomerDetail" formControlName="FirstName" (keypress)="onKeyPress($event)">
                    </mat-form-field>
                  
                </div>

                <div class="col-sm-4">
                  <mat-form-field class="example-full-width" appearance="outline">
                    <input type="text" #myTitle class="x_input" matInput placeholder="LastName"
                      formControlName="LastName" (keypress)="onKeyPress($event)">
                  </mat-form-field>
                </div>
                
                <div class="col-sm-4">
                  <mat-form-field class="example-full-width" appearance="outline">
                    <input type="tel" #myTitle class="x_input" matInput placeholder="MobileNo"
                       formControlName="MobileNo">
                  </mat-form-field>
                </div>

                <div class="col-sm-4">
                  <mat-form-field class="example-full-width" appearance="outline">
                    <input   type="email" #myTitle class="x_input" matInput placeholder="Email"
                      formControlName="Email">
                  </mat-form-field>
                </div><br /><br />
                <div class="col-sm-5">
                  <div class="row">
                    <div class="col-sm-12">
                      <ng-select placeholder="Visit Purpose" formControlName="visitPurpose"
                        [items]="visitPurposeDropDown.Data" bindLabel="TEXT" bindValue="Id">
                      </ng-select>
                    </div>
                  </div>
                  </div>
                  <div class="col-sm-12">
                  <div class="formcntr text-center pb-4">
                    <div class="no-drop TokenBtn" role="group"
                      aria-label="Third group">
                      <button type="button" [disabled]="buttonDisabled" (click)="createToken()"
                        class="btn btn-success">Create Token</button>
                    </div>
                  </div>
                </div>
              </div>
              </div>
              </div>
            </div>
          </div>
        </div>
   
  </form>
</div>

</section>

<div class="container" style="border-radius:8px;" [hidden]="isDisplayTokenHidden">
<div class="row">
  <div class="col-12" style="justify-content: center;text-align:center">
    <mat-card class="example-card">
      <mat-card-header style="justify-content: center;text-align:center">
        <!-- <mat-card-title>Customer Token</mat-card-title> -->
      </mat-card-header>
      <mat-card-content>
        <div>
          <label style="font-size: 23px !important;font-weight: 600;">Your Reservation was successfully created</label>
        </div>

        <div style="width: 90%;height: 300px; z-index: 1; position: absolute; display: flex; align-items: center; justify-content: center; ">
          <div style="font-weight: 600; padding-left: -25px; padding-left: 4%; padding-bottom: 3%;">
            <div class="row">
                <div class="col-lg-12 col-sm-6 col-6" >
                  <label class="tokenLabel">Token Number</label>
                </div>
                </div>
            <div class="row">
                <div class="col-lg-4">
                  <label class="tokenNumber mt-2">{{token}}</label>
                </div>
            </div>

          </div>
        </div>

        <div>
          <!-- <p style="font-size: 23px !important;font-weight: 600; z-index: 1; position: absolute;  margin: 12% 39%;" >Token Number E1</p> -->
          <img src="assets/images/token2.png">
        </div>

        <h1>{{token}}</h1>
        Redirecting .....
      </mat-card-content>
      <mat-card-footer>
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </mat-card-footer>
    </mat-card>
  </div>
</div>

</div>
