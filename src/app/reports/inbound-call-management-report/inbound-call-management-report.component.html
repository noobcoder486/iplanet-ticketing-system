
<section class="content">
    <ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
        <p style="color: white">Loading ,Please Wait...</p>
    </ngx-spinner>

    <mat-card class="mt-2">
        <div class="row">
            <div class="col-lg-8 col-sm-4 col-md-4">
                <p style="font-size: 18px !important; font-weight: 600 !important">
                    Inbound Call Management Report
                </p>
            </div>

            <div class="col-lg-2 col-sm-4 col-md-4">
                <button class="btn blue-button" (click)="GetInboundCallManagementReport('')">Generate Report</button>
            </div>

            <div class="col-lg-2 col-sm-4 col-md-4">
                <button class="btn btn-success" (click)="ExportInboundCallManagementReport()">Export Report</button>
            </div>
        </div>
    </mat-card>

    <mat-card class="mt-2">
    <div class="row">

        
        <div class="col-lg-3 col-md-6 col-sm-6">
            <label style="font-size: 13px !important; font-weight: 600 !important;">Unique ID</label>
            <input type="text" [(ngModel)]="UniqueId" placeholder="Enter Unique ID" style="padding: 3px; width:100%; margin-top: 8px !important;">
        </div>

        
        <div class="col-lg-3 col-md-6 col-sm-6">
            <label style="font-size: 13px !important; font-weight: 600 !important;">Mobile No</label>
            <input type="text" [(ngModel)]="MobileNo" placeholder="Enter Mobile No" style="padding: 3px; width:100%; margin-top: 8px !important;">
        </div>

        
        <div class="col-lg-3 col-md-6 col-sm-6">
            <label style="font-weight: 600;">Call Status</label>
            <ng-select style="width:100%; margin-top: -15px !important;" [items]="StatusDD" [(ngModel)]="CallStatus"></ng-select>
        </div>

     
        <div class="col-lg-3 col-md-6 col-sm-6">
            <label style="font-weight: 600;">Location</label>
            <ng-select style="width:100%; margin-top: -15px !important;" [items]="LocationForJob.Data" [(ngModel)]="LocationCode" bindValue="Id" bindLabel="TEXT"></ng-select>
        </div>

    </div>

    <div class="row mt-2">
        
        <div class="col-lg-3 col-md-6 col-sm-6">
            <mat-form-field appearance="fill" style="width: 100%;">
                <mat-label>Start Date</mat-label>
                <input matInput [matDatepicker]="startPicker" [(ngModel)]="StartDate" name="StartDate" placeholder="Start date">
                <mat-datepicker-toggle matTooltip="Select Start Date" matSuffix [for]="startPicker"></mat-datepicker-toggle>
                <mat-datepicker #startPicker></mat-datepicker>
            </mat-form-field>
        </div>

        
        <div class="col-lg-3 col-md-6 col-sm-6">
            <mat-form-field appearance="fill" style="width: 100%;">
                <mat-label>End Date</mat-label>
                <input matInput [matDatepicker]="endPicker" [(ngModel)]="EndDate" name="EndDate" placeholder="End date">
                <mat-datepicker-toggle matTooltip="Select End Date" matSuffix [for]="endPicker"></mat-datepicker-toggle>
                <mat-datepicker #endPicker></mat-datepicker>
            </mat-form-field>
        </div>

      
        <!-- <div class="col-lg-2 col-md-7 col-sm-7 d-flex justify-content-center align-items-center">
            <button class="btn blue-button"  (click)="GetInboundCallManagementReport('')">Search</button>
        </div> -->

    </div>
 </mat-card>



    <mat-card class="mt-2">
        <div class="row clearfix">
            <div class="table-responsive">
                <nitc-grid [gridcolumns]="columns" [dataSource]="detail" 
                    [hideSpinnerEvents]="jobListHideSpinnerEvent" 
                     (changeEvent)="PageChange($event)">
                </nitc-grid>
            </div>
        </div>

    </mat-card>

</section>
