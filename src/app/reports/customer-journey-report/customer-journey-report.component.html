<section class="content">
  <ngx-spinner size="medium" [type]="typeSelected">
    <p style="font-size: 20px; color: white">Loading...</p>
  </ngx-spinner>

  <mat-card style="z-index: 9;">

    <div class="row" style="display: flex;justify-content: space-between;padding-bottom: 10px;">
      <div class="col-sm-4 col-lg-12 col-md-4">
        <p class="HeaderText">Customer Journey Report </p>
      </div>


    </div>

    <div class="row" style="border: 1px solid #dddddd;padding: 10px;">
      <div class="col-sm-3 col-lg-2 col-md-3">
        <label style="font-weight: 600;padding-bottom: 2px;">Location</label><br>
        <ng-select [items]="LocationForJob.Data" [(ngModel)]="LocationData" bindLabel="TEXT" bindValue="Id"></ng-select>
      </div>

      <div class="col-sm-3 col-md-3 col-lg-2 col-12">
        <label style="font-weight: 600;padding-bottom: 2px;">Customer Code</label><br>
        <input type="text" style="border-radius: 0px; height: 34px; width: 100%; border: 1px solid rgb(211, 211, 211);"
          placeholder="Customer Code" [(ngModel)]="CaseIdData" />
      </div>

      <!-- <div class="col-sm-3 col-lg-2 col-md-3">
        <label style="font-weight: 600;padding-bottom: 2px;">Invoice Generated?</label><br>
        <ng-select  (change)="onFlagChange($event)" [items]="YesNoOption" [(ngModel)]="InvoiceFlag"></ng-select>
      </div> -->

      <!-- <div class="col-sm-5 col-md-5 col-lg-2">
        <mat-form-field appearance="fill">
          <mat-label>Enter a date range</mat-label>

          <div style="display: flex;align-items: center;">
            <div>
              <mat-date-range-input [rangePicker]="picker">
                <input matStartDate [(ngModel)]="StartDate" placeholder="Start date">
                <input matEndDate [(ngModel)]="EndDate" placeholder="End date">
              </mat-date-range-input>
            </div>

            <div>
              <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
              <mat-date-range-picker #picker></mat-date-range-picker>
            </div>
          </div>
        </mat-form-field>
      </div> -->
      <div class="col-sm-5 col-md-5 col-lg-2">
        <mat-form-field appearance="fill">
          <mat-label>From Date</mat-label>
      
          <div style="display: flex; align-items: center;">
            <div>
              <input matInput [matDatepicker]="fromDatePicker" [(ngModel)]="StartDate" (ngModelChange)="ValidateDateRange()" placeholder="Start date" (dateChange)="onFromDateSelected()" [max]="maxDate">
            </div>
      
            <div>
              <mat-datepicker-toggle matSuffix [for]="fromDatePicker"></mat-datepicker-toggle>
              <mat-datepicker #fromDatePicker></mat-datepicker>
            </div>
          </div>
        </mat-form-field>
      </div>
      
      <div class="col-sm-5 col-md-5 col-lg-2">
        <mat-form-field appearance="fill">
          <mat-label>To Date</mat-label>
      
          <div style="display: flex; align-items: center;">
            <div>
              <input matInput [matDatepicker]="toDatePicker" [(ngModel)]="EndDate" (ngModelChange)="ValidateDateRange()" placeholder="End date"  (dateChange)="onToDateSelected()" [max]="maxDate">
            </div>
      
            <div>
              <mat-datepicker-toggle matSuffix [for]="toDatePicker"></mat-datepicker-toggle>
              <mat-datepicker #toDatePicker></mat-datepicker>
            </div>
          </div>
        </mat-form-field>
      </div>
      

    </div>
        
        

    


    <div class=" " style="padding-top: 10px;display: flex;justify-content: flex-end;">
      <div style="padding-right: 40px;">
        <button style="float:right" type="submit" (click)="exportReportData()" class="btn btnClass">Export
          Report</button>
      </div>

      <div>
        <button style="float:right" type="submit" (click)="getReportData()" class="btn btnClass">Generate
          Report</button>
      </div>
    </div>

    <!-- <div class="row">
          <div class="col-sm-6 col-md-12 col-lg-12 ">
            <button style="float:right"  type="submit" (click)="exportReportData()" class="btn btnClass">Export Report</button>&nbsp;
            <button style="float:right"  type="submit" (click)="getReportData()" class="btn btnClass">Generate Report</button>
          </div>
        </div> -->
  </mat-card><br />

  <mat-card *ngIf="results.length>0">

    <div class="table-responsive">
      <nitc-grid [gridcolumns]="columns" [dataSource]="detail" (actionEvent)="actionEmit($event)"
        [actions]="actionDetails" [hideSpinnerEvents]="hideSpinnerEvent" (changeEvent)="loadPageData($event)"
        [isAllowSelect]="isChoose">
      </nitc-grid>
    </div>

  </mat-card>

</section>
