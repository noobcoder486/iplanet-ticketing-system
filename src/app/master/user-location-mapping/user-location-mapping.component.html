<section class="content">
    <ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
    <p style="color: white"> Loading... </p>
  </ngx-spinner>
    <div class="container-fluid">
     <!-- ADD Button -->
     <mat-card class="p-2 mb-4" style="z-index: 9;">
        <div class="row">
          <div class="col-sm-10 ">
            <p class="h4">User Location Mapping List</p>
            <p class="mt-11 ml-8">
              <span *ngFor="let cumb of breadCumbList;let i = index">
                <span *ngIf="breadCumbList.length-1 == i">
                  <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>{{cumb.text}}
                </span>
                <a *ngIf="breadCumbList.length-1 != i" (click)="breadCumbClick(cumb.url)" class="breadcumb">
                  <span *ngIf="i!=0">
                    <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>
                  </span> {{cumb.text}}
                </a>
              </span>
            </p>
  
          </div>
          <div class="col-sm-2 btn-head-group">
            <div class="d-flex justify-content-end">
              <ng-container *ngIf="toolBarAction.length > 0">
                <ng-container *ngFor="let toolbar of toolBarAction">
                  <button mat-raised-button color="primary" class="{{toolbar.title}}" (click)="actionEvent(toolbar)">
                    <mat-icon>{{toolbar.icon}}</mat-icon>
                    <span class="{{toolbar.title}}">{{toolbar.title}}</span>
                  </button>
                </ng-container>
              </ng-container>
            </div>
          </div>
        </div>
  
      </mat-card>
      <mat-card class="p-2 mb-4">
        <form>
            <div class="mat-card-s3">
                <div class="d-flex">
                    <div class="col-lg-3 col-sm-3 col-md-3">
                        <mat-form-field class="example-full-width" appearance="outline">
                            <input type="text" class="x_input" matInput placeholder="UserName"
                                [(ngModel)]="userName" name="userName"
                              >
                        </mat-form-field>
                    </div>
                    <!-- first field -->
                    <div class="col-lg-3 col-sm-3 col-md-3">
                        <mat-form-field class="example-full-width" appearance="outline">
                            <input type="text" class="x_input" matInput placeholder="Location Code"
                                [(ngModel)]="locationCode" name="locationCode">
                        </mat-form-field>
                    </div>
                    <!-- 4rth field -->
                    <div class="col-lg-3 col-sm-3 col-md-3">
                        <div class="x_final_buttons1" style="margin: 19px 0 15px 85px !important;">
                            <button  class="x_final_button x_active_btn x_save_button"
                                (click)="search()">Search</button>
                        </div>
                    </div>
                    <div class="col-lg-3 col-sm-3 col-md-3">
                        <div class="x_final_buttons1" style="margin: 20px 0 15px !important;">
                            <button matTooltip="Export as Excel" style="background-color: #198754 !important; border: 2px #198754 !important;" class="x_final_button x_active_btn x_save_button"
                                (click)="ExportUserLocationMapping()">Export</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </mat-card>

      
  
      <!-- Data -->
      <mat-card class="m-0 p-0">
        <div class="row clearfix" *ngIf="columns.length > 0">
          <div class="table-responsive">  
            <nitc-grid [gridcolumns]="columns" [dataSource]="detail" [actions]="actionDetails" [hideSpinnerEvents]="hideSpinnerEvent"
            (actionEvent)="actionEmit($event)" (changeEvent)="loadPageData($event)" [isAllowSelect]="isChoose">
            </nitc-grid>
          </div>
        </div>
      </mat-card>
    </div>
  </section>
