<section class="content">
  <div class="container-fluid">
    <mat-card class="p-2 mb-4" style="z-index: 9;">
      <div class="row">
        <div class="col-sm-10 ">
          <b class="h4" style="font-size: 18px !important; font-weight: 600 !important;">Customer Master</b>
          <p class="mt-11 ml-8">
            <span *ngFor="let cumb of breadCumbList;let i = index">
              <span *ngIf="breadCumbList.length-1 == i">
                <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>{{cumb.text}}
              </span>
              <a *ngIf="breadCumbList.length-1 != i" (click)="breadCumbClick(cumb.url)" class="breadcumb">
                <span *ngIf="i!=0">
                  <mat-icon class="breadcumb-icon">arrow_forward_ios</mat-icon>
                </span> {{cumb.text}}
              </a>
            </span>
          </p>

        </div>
        <div class="col-sm-2 btn-head-group">
          <div class="d-flex justify-content-end">
            <ng-container *ngIf="toolBarAction.length > 0">
              <ng-conainer *ngFor="let toolbar of toolBarAction">
                <button mat-raised-button color="primary" class="{{toolbar.title}}" (click)="actionEvent(toolbar)">
                  <mat-icon>{{toolbar.icon}}</mat-icon>
                  <span class="{{toolbar.title}}">{{toolbar.title}}</span>
                </button>
              </ng-conainer>
            </ng-container>
          </div>
        </div>
      </div>
    </mat-card>

    <mat-card class="mt-2">
      <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3">
          <label>Customer Code</label> <br>
          <input style="width: 100%;" type="text" placeholder="Customer Code" [(ngModel)]="customercode"
            name="customercode">
        </div>
        <div class="col-lg-3 col-md-3 col-sm-3">
          <label>Customer First Name</label> <br>
          <input style="width: 100%;" type="text" placeholder="Customer Name" [(ngModel)]="customername"
            name="customerfirstname">
        </div>
        <div class="col-lg-3 col-md-3 col-sm-3">
          <label>Mobile No</label> <br>
          <input style="width: 100%;" type="text" placeholder="Mobile No" [(ngModel)]="phonenumber" name="mobilenumber">
        </div>
        <div class="col-lg-3 col-md-3 col-sm-3">
          <label>Email Id</label> <br>
          <input style="width: 100%;" type="text" placeholder="Email Id" [(ngModel)]="gmail" name="email">
        </div>
      </div>

      <div class="mt-3 row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-3 col-md-3 col-sm-3"></div>

        <div class="col-lg-3 col-md-3 col-sm-3" style="gap: 5px; display: flex;">
          <mat-form-field appearance="fill" style="width: 49%;">
            <mat-label>Start Date</mat-label>
            <input matInput [matDatepicker]="startPicker" [(ngModel)]="StartDate" name="StartDate"
              placeholder="Start date">
            <mat-datepicker-toggle matTooltip="Select Start Date" matSuffix [for]="startPicker"></mat-datepicker-toggle>
            <mat-datepicker #startPicker></mat-datepicker>
          </mat-form-field>


          <mat-form-field appearance="fill" style="width: 49%;">
            <mat-label>End Date</mat-label>
            <input matInput [matDatepicker]="endPicker" [(ngModel)]="EndDate" name="EndDate" placeholder="End date">
            <mat-datepicker-toggle matTooltip="Select End Date" matSuffix [for]="endPicker"></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="col-lg-3 col-md-3 col-sm-3 d-flex align-items-end gap-2">
          <button style="width: 45%; margin-bottom: 3px;" class="btn blue-button" (click)="search()">Search</button>
          <button style="width: 45%; margin-bottom: 3px;" class="btn btn-success" (click)="ExportCustomerReport()">Export</button>
        </div>

      </div>
    </mat-card>

    <mat-card class="m-2 p-0">
      <div class="row clearfix">
        <div class="table-responsive">
          <nitc-grid [gridcolumns]="columns" [dataSource]="detail" [actions]="actionDetails"
            [hideSpinnerEvents]="jobListHideSpinnerEvent" (actionEvent)="actionEmit($event)" [isAllowSelect]="isChoose"
            (changeEvent)="loadPageData($event)">
          </nitc-grid>
        </div>
      </div>
    </mat-card>

  </div>
</section>
