<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
    <p style="color: white"> Loading... </p>
</ngx-spinner>

<section class="content">
    <div class="container-fluid"><br />
        <mat-card class="p-2 mb-4" style="z-index: 9;">
            <div class="row">
                <div class="col-lg-11 col-sm-11 col-6" style="display: flex;align-items: center;">
                    <label style="font-size: 20px !important;font-weight: 600;">{{PageTitle}}</label>
                </div>
                <div class="col-lg-1 col-sm-1 col-md-4" style="display: flex;align-items: center;">
                    <button class="btn btn-warning" (click)="cancel()">
                        Back
                    </button>
                </div>

            </div>
        </mat-card>
        <mat-card class="m-0 p-0">
            <div class="row clearfix" style="display: flex;">
                <div class="col-lg-4 col-sm-4" style="padding-top: 1%;">
                    <ng-select [disabled]="this.params.ToteGuid" [items]="LocationForJob.Data" [(ngModel)]="storeCode"
                        bindLabel="TEXT" bindValue="Id" placeholder="Store Code"></ng-select>
                </div>
                <div class="col-lg-4 col-sm-4" style="padding-top: 1%;">
                    <ng-select [items]="BulkReturnTypeDD.Data" bindLabel="TEXT" bindValue="Id"
                        [(ngModel)]="BulkReturnType" placeholder="Return Type"></ng-select>
                </div>
                <div class="col-lg-4 col-sm-4" style="padding-top: 1%;">
                    <ng-select [items]="BoxTypeDD.Data" bindLabel="TEXT" bindValue="Id" [(ngModel)]="boxType"
                        placeholder="Box Type"></ng-select>
                </div>
                <div class="col-lg-4 col-sm-4" style="padding-top: 1%;">
                    <mat-form-field appearance="standard" [style.width.%]="100">
                        <mat-label>AWB No</mat-label>
                        <input matInput type="text" [(ngModel)]="awbNo" placeholder="Enter AWB No.">
                    </mat-form-field>
                </div>
                <div class="col-lg-4 col-sm-4" style="padding-top: 1%;">
                    <mat-form-field appearance="standard" [style.width.%]="100">
                        <mat-label>DC NO</mat-label>
                        <input matInput type="text" [(ngModel)]="dcNo" placeholder="Enter DC No.">
                    </mat-form-field>
                </div>




            </div>
        </mat-card>
        <mat-card class="mt-2" *ngIf="!isEdit">
            <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div class="row" style="align-items: center;">
                        <div class="col-lg-5">
                            <label class="mx-2">Seal No.</label>
                            <input type="text" [(ngModel)]="SealNo">
                        </div>
                        <div class="col-lg-5">
                            <label class="mx-2">Tote No.</label>
                            <input type="text" [(ngModel)]="ToteNo">
                        </div>

                        <div class="col-lg-2">
                            <button class="btn btn-success" (click)="Additem()">Add</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div style="flex: 1; overflow-x: auto;">
                        <table style="width: 100%; border: 1px solid #ddd; text-align: left;">
                            <thead>
                                <tr>
                                    <th scope="col">Seal No</th>
                                    <th scope="col">Tote No</th>
                                    <th scope="col">Delete</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of this.ToteList">
                                    <td style=" white-space: nowrap;">{{ item.SealNo}}</td>
                                    <td> <span> {{item.ToteNo}}</span></td>
                                    <td style="text-align: center; "> <span><i style="color:red"
                                                (click)="RemoveItem(item)" class="fa-regular fa-trash"></i></span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </mat-card>
        <mat-card *ngIf="!isEdit">
            <div class="row mt-3">
                <div class="col-11 "></div>
                <div class="col-1">
                    <button [disabled]="isSaving" class="btn btn-success" style="height: 30px;"
                        (click)="SaveTote()">Submit</button>
                </div>
            </div>
        </mat-card>

        <!-- while updation  -->
        <mat-card class="mt-2" *ngIf="isEdit">
            <div class="row" style="align-items: center;">
                <div class="col-lg-4 col-sm-4 col-md-4" style="padding-top: 1%;">
                    <mat-form-field appearance="standard" [style.width.%]="100">
                        <mat-label>Seal NO</mat-label>
                        <input matInput type="text" [(ngModel)]="SealNo" placeholder="Enter Seal No.">
                    </mat-form-field>
                </div>
                <div class="col-lg-4 col-sm-4 col-md-4" style="padding-top: 1%;">
                    <div class="row">

                        <mat-form-field appearance="standard" [style.width.%]="100">
                            <mat-label>Tote No </mat-label>
                            <input matInput type="text" [(ngModel)]="ToteNo" placeholder="Enter Tote No">
                        </mat-form-field>
                    </div>
                </div>
                <div class="col-lg-2 col-sm-2 col-md-2" style="padding-top: 1%;"></div>
                <div class="col-lg-2 col-sm-2 col-md-2" style="padding-top: 1%;">

                    <button (click)="ToteUpdationDeletion()" [disabled]="isUpdating" class="btn btn-success">
                        Update
                    </button>
                </div>
            </div>
        </mat-card>

    </div>
